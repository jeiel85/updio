name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: install node dependencies
        run: npm install

      - name: build sidecar
        run: npm run build:sidecar

      - name: download ffmpeg sidecar
        shell: pwsh
        run: |
          $ffmpeg_url = "https://github.com/GyanD/codexffmpeg/releases/download/7.1/ffmpeg-7.1-full_build.zip"
          Invoke-WebRequest -Uri $ffmpeg_url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_temp
          $bin_dir = "src-tauri/binaries"
          if (!(Test-Path $bin_dir)) { New-Item -ItemType Directory -Path $bin_dir }
          Get-ChildItem -Path "ffmpeg_temp" -Filter "ffmpeg.exe" -Recurse | Copy-Item -Destination "$bin_dir/ffmpeg-x86_64-pc-windows-msvc.exe"
          Get-ChildItem -Path "ffmpeg_temp" -Filter "ffprobe.exe" -Recurse | Copy-Item -Destination "$bin_dir/ffprobe-x86_64-pc-windows-msvc.exe"

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "v__VERSION__ - Vibe Video Upscaler Stable"
          releaseBody: "Automated release from GitHub Actions. AI-powered video upscaling."
          releaseDraft: false
          prerelease: false

      - name: create portable zip
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $portable_dir = "portable"
          if (Test-Path $portable_dir) { Remove-Item -Recurse -Force $portable_dir }
          New-Item -ItemType Directory -Path $portable_dir
          
          # 빌드된 메인 실행 파일 찾기 (여러 경로 후보 검색)
          $exe_src = Get-ChildItem -Path "src-tauri/target/release" -Filter "updio.exe" -Recurse | Select-Object -First 1
          if ($exe_src) {
              Copy-Item $exe_src.FullName "$portable_dir/updio.exe"
          } else {
              Write-Error "Could not find updio.exe in target directory"
              exit 1
          }
          
          # 사이드카 및 바이너리 복사
          Copy-Item "src-tauri/binaries/vibe-engine-x86_64-pc-windows-msvc.exe" "$portable_dir/vibe-engine.exe"
          Copy-Item "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe" "$portable_dir/ffmpeg.exe"
          Copy-Item "src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe" "$portable_dir/ffprobe.exe"
          
          Compress-Archive -Path "$portable_dir/*" -DestinationPath "updio_${version}_x64_portable.zip"

      - name: upload portable zip to release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          # 릴리즈가 생성될 때까지 잠시 대기
          Start-Sleep -Seconds 5
          gh release upload "v$version" "updio_${version}_x64_portable.zip" --clobber
