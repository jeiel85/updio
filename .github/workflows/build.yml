name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_description:
        description: 'Release title description after "v__VERSION__ -"'
        required: false
        default: ''
      release_body:
        description: 'Release notes body'
        required: false
        default: ''

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: install node dependencies
        run: npm install

      - name: build sidecar
        run: npm run build:sidecar

      - name: setup sidecar binaries and licenses
        shell: pwsh
        run: |
          $bin_dir = "src-tauri/binaries"
          if (!(Test-Path $bin_dir)) { New-Item -ItemType Directory -Path $bin_dir }
          
          # 1. FFmpeg
          $ffmpeg_url = "https://github.com/GyanD/codexffmpeg/releases/download/7.1/ffmpeg-7.1-essentials_build.zip"
          $ffmpeg_hash = "8748283d821613d930b0e7be685aaa9df4ca6f0ad4d0c42fd02622b3623463c6"
          Invoke-WebRequest -Uri $ffmpeg_url -OutFile ffmpeg.zip
          $actual_ffmpeg_hash = (Get-FileHash ffmpeg.zip -Algorithm SHA256).Hash
          if ($actual_ffmpeg_hash.ToLower() -ne $ffmpeg_hash.ToLower()) {
            Write-Host "Expected: $ffmpeg_hash"
            Write-Host "Actual: $actual_ffmpeg_hash"
            throw "FFmpeg hash mismatch"
          }
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_temp
          Get-ChildItem -Path "ffmpeg_temp" -Filter "ffmpeg.exe" -Recurse | Copy-Item -Destination "$bin_dir/ffmpeg-x86_64-pc-windows-msvc.exe"
          Get-ChildItem -Path "ffmpeg_temp" -Filter "ffprobe.exe" -Recurse | Copy-Item -Destination "$bin_dir/ffprobe-x86_64-pc-windows-msvc.exe"
          
          # 2. Real-ESRGAN
          $esrgan_url = "https://github.com/nihui/realesrgan-ncnn-vulkan/releases/download/v0.2.0/realesrgan-ncnn-vulkan-20220424-windows.zip"
          $esrgan_hash = "6ce2ddf1ba6daf0ccef9bb97512f33ecd058de462d90cde88ce2621d1421bfb8"
          Invoke-WebRequest -Uri $esrgan_url -OutFile esrgan.zip
          if ((Get-FileHash esrgan.zip -Algorithm SHA256).Hash -ne $esrgan_hash) { throw "Real-ESRGAN hash mismatch" }
          Expand-Archive esrgan.zip -DestinationPath esrgan_temp
          
          # 3. Real-CUGAN
          $cugan_url = "https://github.com/nihui/realcugan-ncnn-vulkan/releases/download/v0.1.0/realcugan-ncnn-vulkan-20220227-windows.zip"
          Invoke-WebRequest -Uri $cugan_url -OutFile cugan.zip
          Expand-Archive cugan.zip -DestinationPath cugan_temp
          
          # 4. Prepare src-python/bin (for PyInstaller sidecar build)
          $py_bin_dir = "src-python/bin"
          if (!(Test-Path $py_bin_dir)) { New-Item -ItemType Directory -Path $py_bin_dir }
          Copy-Item "esrgan_temp/realesrgan-ncnn-vulkan.exe" "$py_bin_dir/"
          Copy-Item "esrgan_temp/models" "$py_bin_dir/" -Recurse
          Copy-Item "cugan_temp/realcugan-ncnn-vulkan.exe" "$py_bin_dir/realcugan/"
          Copy-Item "cugan_temp/models-*" "$py_bin_dir/realcugan/" -Recurse
          
          # 5. Collect Licenses
          $lic_base = "third-party-licenses"
          New-Item -ItemType Directory -Path "$lic_base/ffmpeg" -Force
          New-Item -ItemType Directory -Path "$lic_base/realesrgan" -Force
          New-Item -ItemType Directory -Path "$lic_base/realcugan" -Force
          
          Get-ChildItem -Path "ffmpeg_temp" -Filter "LICENSE" -Recurse | Select-Object -First 1 | Copy-Item -Destination "$lic_base/ffmpeg/"
          Get-ChildItem -Path "ffmpeg_temp" -Filter "README.txt" -Recurse | Select-Object -First 1 | Copy-Item -Destination "$lic_base/ffmpeg/"
          # Real-ESRGAN/CUGAN usually have the license in the README or a separate file
          if (Test-Path "esrgan_temp/LICENSE") { Copy-Item "esrgan_temp/LICENSE" "$lic_base/realesrgan/" }
          if (Test-Path "cugan_temp/LICENSE") { Copy-Item "cugan_temp/LICENSE" "$lic_base/realcugan/" }

      - name: prepare release metadata
        id: release_meta
        shell: pwsh
        run: |
          $description = "${{ github.event.inputs.release_description }}"
          if ([string]::IsNullOrWhiteSpace($description)) {
            $description = git log -1 --pretty=%s
          }
          $description = $description.Trim()
          "description=$description" >> $env:GITHUB_OUTPUT

          $body = "${{ github.event.inputs.release_body }}"
          if ([string]::IsNullOrWhiteSpace($body)) {
            $body = "Automated release from GitHub Actions.`n`nCommit: $description"
          }
          $body = $body.Replace("`r`n", "%0A").Replace("`n", "%0A").Replace("`r", "%0A")
          "body=$body" >> $env:GITHUB_OUTPUT

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "v__VERSION__ - ${{ steps.release_meta.outputs.description }}"
          releaseBody: "${{ steps.release_meta.outputs.body }}"
          releaseDraft: false
          prerelease: false

      - name: create portable zip
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $portable_dir = "portable"
          if (Test-Path $portable_dir) { Remove-Item -Recurse -Force $portable_dir }
          New-Item -ItemType Directory -Path $portable_dir
          
          # 빌드된 메인 실행 파일 찾기. Cargo package name과 Tauri productName이 다를 수 있다.
          $exe_src = Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" -File |
            Where-Object { $_.Name -notin @("vibe-engine.exe", "ffmpeg.exe", "ffprobe.exe") } |
            Select-Object -First 1
          if ($exe_src) {
              Copy-Item $exe_src.FullName "$portable_dir/updio.exe"
          } else {
              Write-Error "Could not find the built Tauri executable in src-tauri/target/release"
              Get-ChildItem -Path "src-tauri/target/release" -Recurse -Filter "*.exe" | Select-Object FullName
              exit 1
          }
          
          # 사이드카 및 바이너리 복사
          Copy-Item "src-tauri/binaries/vibe-engine-x86_64-pc-windows-msvc.exe" "$portable_dir/vibe-engine.exe"
          Copy-Item "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe" "$portable_dir/ffmpeg.exe"
          Copy-Item "src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe" "$portable_dir/ffprobe.exe"
          Copy-Item "LICENSE" "$portable_dir/LICENSE"
          Copy-Item "THIRD_PARTY_NOTICES.md" "$portable_dir/THIRD_PARTY_NOTICES.md"
          Copy-Item "third-party-licenses" "$portable_dir/third-party-licenses" -Recurse
          
          Compress-Archive -Path "$portable_dir/*" -DestinationPath "updio_${version}_x64_portable.zip"

      - name: upload portable zip to release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          # 릴리즈가 생성될 때까지 잠시 대기
          Start-Sleep -Seconds 5
          gh release upload "v$version" "updio_${version}_x64_portable.zip" --clobber
          
          # 불필요한 사이드카 바이너리 삭제 (사용자 혼란 방지)
          Write-Host "Cleaning up internal binaries from release assets..."
          $assets = gh release view "v$version" --json assets --jq '.assets[].name'
          foreach ($asset in $assets) {
              if ($asset -like "vibe-engine*") {
                  Write-Host "Deleting internal asset: $asset"
                  gh release delete-asset "v$version" "$asset" -y
              }
          }
